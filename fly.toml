app = "sprout-server"
primary_region = "nrt"

[build]
  dockerfile = "server/Dockerfile"

[env]
  APP_ENV = "production"
  PORT = "8080"
  SQLITE_PATH = "/data/sprout.db"
  DEV_AUTH_ENABLED = "false"
  SUBSCRIPTION_MODE = "mock"
  AI_MODE = "mock"
  AI_PROVIDER = "mock"

[mounts]
  source = "sprout_data"
  destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

  [[http_service.checks]]
    grace_period = "10s"
    interval = "15s"
    method = "GET"
    path = "/healthz"
    timeout = "5s"
