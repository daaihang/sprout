		8F4D4500E822498FAC2A2C0B /* Upload Debug Symbols to Sentry */ = {
			isa = PBXShellScriptBuildPhase;
			alwaysOutOfDate = 1;
			buildActionMask = 2147483647;
			files = (
			);
			inputPaths = (
				"${DWARF_DSYM_FOLDER_PATH}/${DWARF_DSYM_FILE_NAME}/Contents/Resources/DWARF/${TARGET_NAME}",
			);
			name = "Upload Debug Symbols to Sentry";
			outputPaths = (
				"${DERIVED_FILE_DIR}/sentry-debug-symbols-uploaded-${TARGET_NAME}-${CONFIGURATION}",
			);
			runOnlyForDeploymentPostprocessing = 0;
			shellPath = /bin/sh;
			shellScript = "# This script ensures Sentry.framework has a matching dSYM in archives and uploads symbols to Sentry.\nset -u\n\nDSYM_DESTINATION=\"${ARCHIVE_DSYMS_PATH:-${DWARF_DSYM_FOLDER_PATH}}\"\nSENTRY_BINARY=\"${TARGET_BUILD_DIR:-}/${FRAMEWORKS_FOLDER_PATH:-}/Sentry.framework/Sentry\"\nGENERATED_SENTRY_DSYM=\"${TEMP_DIR:-/tmp}/Sentry.framework.dSYM\"\nFINAL_SENTRY_DSYM=\"\"\n\ncopy_sentry_dsym() {\n  source_dsym=\"$1\"\n  destination=\"$2\"\n  if [ -d \"$source_dsym\" ] && [ -n \"$destination\" ]; then\n    mkdir -p \"$destination\"\n    rm -rf \"$destination/Sentry.framework.dSYM\"\n    ditto \"$source_dsym\" \"$destination/Sentry.framework.dSYM\"\n    echo \"Copied Sentry.framework.dSYM into $destination\"\n  fi\n}\n\nif [ \"${PLATFORM_NAME:-}\" = \"iphoneos\" ] && [ -f \"$SENTRY_BINARY\" ]; then\n  rm -rf \"$GENERATED_SENTRY_DSYM\"\n  if dsymutil \"$SENTRY_BINARY\" -o \"$GENERATED_SENTRY_DSYM\"; then\n    FINAL_SENTRY_DSYM=\"$GENERATED_SENTRY_DSYM\"\n  fi\n\n  if [ -z \"$FINAL_SENTRY_DSYM\" ]; then\n    DERIVED_DATA_ROOT=\"\"\n    for build_root in \"${BUILD_ROOT:-}\" \"${TARGET_BUILD_DIR:-}\" \"${PROJECT_TEMP_DIR:-}\" \"${TARGET_TEMP_DIR:-}\"; do\n      case \"$build_root\" in\n        */Build/*)\n          DERIVED_DATA_ROOT=\"${build_root%%/Build/*}\"\n          break\n          ;;\n      esac\n    done\n\n    if [ -n \"$DERIVED_DATA_ROOT\" ]; then\n      SENTRY_ARTIFACT_ROOT=\"$DERIVED_DATA_ROOT/SourcePackages/artifacts/sentry-cocoa\"\n      for candidate in \"$SENTRY_ARTIFACT_ROOT\"/Sentry-Dynamic-WithARM64e*/Sentry-Dynamic-WithARM64e.xcframework/ios-arm64_arm64e/dSYMs/Sentry.framework.dSYM \"$SENTRY_ARTIFACT_ROOT\"/Sentry-Dynamic*/Sentry-Dynamic.xcframework/ios-arm64/dSYMs/Sentry.framework.dSYM; do\n        if [ -d \"$candidate\" ]; then\n          FINAL_SENTRY_DSYM=\"$candidate\"\n          break\n        fi\n      done\n    fi\n  fi\n\n  if [ -n \"$FINAL_SENTRY_DSYM\" ]; then\n    copy_sentry_dsym \"$FINAL_SENTRY_DSYM\" \"$DSYM_DESTINATION\"\n    if [ -n \"${ARCHIVE_PATH:-}\" ]; then\n      copy_sentry_dsym \"$FINAL_SENTRY_DSYM\" \"$ARCHIVE_PATH/dSYMs\"\n    fi\n  else\n    echo \"warning: Could not generate or locate Sentry.framework.dSYM.\"\n  fi\nfi\n\nif which sentry-cli >/dev/null; then\n  export SENTRY_ORG=speculo-labs-llc\n  export SENTRY_PROJECT=mory\n  ERROR=$(sentry-cli debug-files upload --include-sources \"$DSYM_DESTINATION\" 2>&1 >/dev/null)\n  UPLOAD_STATUS=$?\n  if [ $UPLOAD_STATUS -ne 0 ]; then\n    echo \"warning: sentry-cli - $ERROR\"\n  fi\nelse\n  echo \"warning: sentry-cli not installed, download from https://github.com/getsentry/sentry-cli/releases\"\nfi\ntouch \"${SCRIPT_OUTPUT_FILE_0}\"\n";
		};
/* End PBXShellScriptBuildPhase section */

