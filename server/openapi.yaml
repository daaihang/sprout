openapi: 3.1.0
info:
  title: Sprout Server API
  version: 0.2.0
  description: Pure backend API for Sprout journaling services.
servers:
  - url: http://localhost:8080
paths:
  /healthz:
    get:
      summary: Health check
      responses:
        "200":
          description: Server is healthy
  /metrics:
    get:
      summary: Lightweight text metrics
      responses:
        "200":
          description: Text metrics response
  /auth/apple:
    post:
      summary: Verify Apple identity token and issue JWT
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                identity_token:
                  type: string
                nonce:
                  type: string
      responses:
        "200":
          description: JWT issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid Apple identity token
  /api/auth/refresh:
    post:
      summary: Refresh JWT
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Refreshed JWT
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
  /api/analyze:
    post:
      summary: Analyze a journal record
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnalyzeRequest"
      responses:
        "200":
          description: Structured analyze response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyzeResponseEnvelope"
  /api/reflections/generate:
    post:
      summary: Generate a reflection candidate from a record aggregate
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReflectionRequest"
      responses:
        "200":
          description: Reflection candidate
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReflectionResponse"
  /api/reflections/replay:
    post:
      summary: Replay or restate a reflection candidate
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReflectionRequest"
      responses:
        "200":
          description: Reflection replay response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReflectionResponse"
  /api/intelligence/refine-transcript:
    post:
      summary: Refine a speech transcript as candidate user-editable text
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TranscriptRefinementRequest"
      responses:
        "200":
          description: Transcript refinement candidate
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TranscriptRefinementResponse"
  /api/intelligence/suggest-questions:
    post:
      summary: Suggest clarification or daily question candidates
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuestionSuggestionRequest"
      responses:
        "200":
          description: Question candidates
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuestionSuggestionResponse"
  /api/intelligence/suggest-chapters:
    post:
      summary: Suggest chapter or stage candidates
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChapterSuggestionRequest"
      responses:
        "200":
          description: Chapter candidates
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChapterSuggestionResponse"
  /api/intelligence/analyze-photo:
    post:
      summary: Analyze photo semantics from local labels and OCR
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PhotoSemanticAnalysisRequest"
      responses:
        "200":
          description: Photo semantic candidate
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PhotoSemanticAnalysisResponse"
  /api/subscription/verify:
    get:
      summary: Verify subscription tier for current user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Subscription status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionStatus"
  /api/push/register:
    post:
      summary: Register or update APNs push token
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [device_id, apns_token, timezone]
              properties:
                device_id:
                  type: string
                apns_token:
                  type: string
                timezone:
                  type: string
                has_question_ready:
                  type: boolean
                notifications_enabled:
                  type: boolean
                analysis_ready_enabled:
                  type: boolean
                daily_question_enabled:
                  type: boolean
                reflection_ready_enabled:
                  type: boolean
                delivery_pace:
                  type: string
                max_per_day:
                  type: integer
                minimum_minutes_between_notifications:
                  type: integer
                quiet_start:
                  type: string
                quiet_end:
                  type: string
                rich_previews_enabled:
                  type: boolean
                local_intelligence_enabled:
                  type: boolean
                cloud_intelligence_enabled:
                  type: boolean
                semantic_search_enabled:
                  type: boolean
                home_suggestions_enabled:
                  type: boolean
      responses:
        "200":
          description: Registration succeeded
  /api/push/enqueue:
    post:
      summary: Queue a remote push intent and attempt due delivery
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [intent_id, kind, title, body, target]
              properties:
                intent_id:
                  type: string
                kind:
                  type: string
                title:
                  type: string
                body:
                  type: string
                target_type:
                  type: string
                  enum: [record, artifact, question, entity, place, theme, decision, chapter, reflection]
                target_id:
                  type: string
                privacy_level:
                  type: string
                  enum: [generic, contextual, rich]
                deep_link:
                  type: string
                target:
                  $ref: "#/components/schemas/PushDeliveryTarget"
                payload:
                  $ref: "#/components/schemas/PushDeliveryPayload"
                scheduled_at:
                  type: string
                  format: date-time
      responses:
        "200":
          description: Enqueue and delivery attempt report
          content:
            application/json:
              schema:
                type: object
                required: [accepted, user_id, queued_count, skipped_count, sent_count, failed_count]
                properties:
                  accepted:
                    type: boolean
                  user_id:
                    type: string
                  queued_count:
                    type: integer
                  skipped_count:
                    type: integer
                  sent_count:
                    type: integer
                  failed_count:
                    type: integer
                  retried_count:
                    type: integer
                  permanent_failed_count:
                    type: integer
  /api/push/delivery-writeback:
    post:
      summary: Write back notification delivery or interaction events
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [device_id, intent_id, action, target_type, target_id]
              properties:
                device_id:
                  type: string
                intent_id:
                  type: string
                action:
                  type: string
                kind:
                  type: string
                target_type:
                  type: string
                target_id:
                  type: string
                occurred_at:
                  type: string
                  format: date-time
      responses:
        "200":
          description: Writeback accepted
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    AuthResponse:
      type: object
      required: [access_token, expires_at, user, mode]
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        expires_at:
          type: string
          format: date-time
        mode:
          type: string
        user:
          type: object
          required: [id, tier]
          properties:
            id:
              type: string
            tier:
              type: string
    AnalyzeRequest:
      type: object
      required: [schema_version, analysis_reason, record_shell, artifacts, known_entities]
      properties:
        schema_version:
          type: string
        client_version:
          type: string
        analysis_reason:
          type: string
        record_shell:
          $ref: "#/components/schemas/RecordShellInput"
        artifacts:
          type: array
          items:
            $ref: "#/components/schemas/ArtifactInput"
        known_entities:
          type: array
          items:
            $ref: "#/components/schemas/KnownEntityInput"
        debug_options:
          $ref: "#/components/schemas/DebugOptions"
    RecordShellInput:
      type: object
      required: [raw_text]
      properties:
        id:
          type: string
        created_at:
          type: string
        updated_at:
          type: string
        raw_text:
          type: string
        capture_source:
          type: string
        user_mood:
          type: string
        user_intensity:
          type: integer
        input_context:
          type: string
    ArtifactInput:
      type: object
      required: [kind]
      properties:
        id:
          type: string
        kind:
          type: string
        title:
          type: string
        summary:
          type: string
        text_content:
          type: string
        metadata:
          type: object
          additionalProperties:
            type: string
    KnownEntityInput:
      type: object
      required: [kind, name]
      properties:
        id:
          type: string
        kind:
          type: string
        name:
          type: string
        aliases:
          type: array
          items:
            type: string
        confidence:
          type: number
    ReflectionRequest:
      type: object
      required: [record_shell, artifacts]
      properties:
        record_shell:
          $ref: "#/components/schemas/RecordShellInput"
        artifacts:
          type: array
          items:
            $ref: "#/components/schemas/ArtifactInput"
        linked_arc_id:
          type: string
        known_entities:
          type: array
          items:
            $ref: "#/components/schemas/KnownEntityInput"
        prompt:
          type: string
        debug_options:
          $ref: "#/components/schemas/DebugOptions"
    DebugOptions:
      type: object
      description: Optional debug-only tuning controls. Omit in normal clients.
      properties:
        prompt_profile:
          type: string
          enum: [strict, balanced, experimental]
          default: balanced
    ReflectionResponse:
      type: object
      required: [title, body, evidence_summary, confidence, source_record_ids]
      properties:
        title:
          type: string
        body:
          type: string
        evidence_summary:
          type: string
        confidence:
          type: number
        source_record_ids:
          type: array
          items:
            type: string
    AnalyzeResponseEnvelope:
      type: object
      properties:
        tags:
          type: array
          items:
            type: string
        retrieval_terms:
          type: array
          items:
            type: string
        emotion:
          type: object
          properties:
            label:
              type: string
            intensity:
              type: integer
            confidence:
              type: number
            interpretation:
              type: string
        entities:
          type: array
          items:
            type: object
            properties:
              kind:
                type: string
              name:
                type: string
              canonical_name:
                type: string
              aliases:
                type: array
                items:
                  type: string
              confidence:
                type: number
              source_artifact_ids:
                type: array
                items:
                  type: string
        candidate_edges:
          type: array
          items:
            type: object
            properties:
              from_name:
                type: string
              from_kind:
                type: string
              to_name:
                type: string
              to_kind:
                type: string
              relation:
                type: string
              confidence:
                type: number
        insight:
          type: string
        summary:
          type: string
        salience_score:
          type: number
        retrieval_terms:
          type: array
          items:
            type: string
        reflection_hint:
          type: string
        follow_up:
          anyOf:
            - type: "null"
            - type: object
              properties:
                question:
                  type: string
                reason:
                  type: string
                expires_at:
                  type: string
        meta:
          type: object
          properties:
            provider:
              type: string
            model:
              type: string
            usage:
              type: object
              properties:
                input_tokens:
                  type: integer
                output_tokens:
                  type: integer
    CloudMeta:
      type: object
      properties:
        provider:
          type: string
        model:
          type: string
        request_id:
          type: string
        usage:
          type: object
          properties:
            input_tokens:
              type: integer
            output_tokens:
              type: integer
    EvidenceSnippet:
      type: object
      required: [snippet]
      properties:
        record_id:
          type: string
        artifact_id:
          type: string
        snippet:
          type: string
        created_at:
          type: string
          format: date-time
    TranscriptRefinementRequest:
      type: object
      required: [schema_version, raw_transcript]
      properties:
        schema_version:
          type: integer
        locale:
          type: string
        record_id:
          type: string
        audio_artifact_id:
          type: string
        raw_transcript:
          type: string
        style:
          type: string
        allow_title:
          type: boolean
    TranscriptRefinementResponse:
      type: object
      properties:
        schema_version:
          type: integer
        refined_transcript:
          type: string
        suggested_title:
          type: string
        edits:
          type: array
          items:
            type: object
            properties:
              kind:
                type: string
              summary:
                type: string
        meta:
          $ref: "#/components/schemas/CloudMeta"
    QuestionCandidate:
      type: object
      required: [kind, prompt, reason]
      properties:
        kind:
          type: string
        prompt:
          type: string
        reason:
          type: string
        candidate_answers:
          type: array
          items:
            type: string
        confidence:
          type: number
        sensitivity:
          type: string
    QuestionSuggestionRequest:
      type: object
      required: [schema_version, target, evidence]
      properties:
        schema_version:
          type: integer
        locale:
          type: string
        target:
          type: object
          required: [type, id]
          properties:
            type:
              type: string
            id:
              type: string
            kind:
              type: string
        evidence:
          type: array
          items:
            $ref: "#/components/schemas/EvidenceSnippet"
        known_profile:
          type: object
          properties:
            display_name:
              type: string
            aliases:
              type: array
              items:
                type: string
            relationship_to_user:
              type: string
        user_preferences:
          type: object
          properties:
            allow_sensitive_questions:
              type: boolean
            question_tone:
              type: string
    QuestionSuggestionResponse:
      type: object
      properties:
        schema_version:
          type: integer
        questions:
          type: array
          items:
            $ref: "#/components/schemas/QuestionCandidate"
        meta:
          $ref: "#/components/schemas/CloudMeta"
    ChapterSuggestionRequest:
      type: object
      required: [schema_version]
      properties:
        schema_version:
          type: integer
        locale:
          type: string
        time_window:
          type: object
          properties:
            start:
              type: string
              format: date-time
            end:
              type: string
              format: date-time
        signals:
          type: array
          items:
            type: object
            properties:
              kind:
                type: string
              label:
                type: string
              record_count:
                type: integer
              salience:
                type: number
        evidence_snippets:
          type: array
          items:
            $ref: "#/components/schemas/EvidenceSnippet"
    ChapterSuggestionResponse:
      type: object
      properties:
        schema_version:
          type: integer
        chapter_candidates:
          type: array
          items:
            type: object
            properties:
              title:
                type: string
              summary:
                type: string
              evidence_record_ids:
                type: array
                items:
                  type: string
              confidence:
                type: number
              requires_confirmation:
                type: boolean
        meta:
          $ref: "#/components/schemas/CloudMeta"
    PhotoSemanticAnalysisRequest:
      type: object
      required: [schema_version]
      properties:
        schema_version:
          type: integer
        locale:
          type: string
        record_id:
          type: string
        photo_artifact_id:
          type: string
        local_labels:
          type: array
          items:
            type: string
        ocr_text:
          type: string
        caption_hint:
          type: string
        metadata:
          type: object
          additionalProperties:
            type: string
    PhotoSemanticAnalysisResponse:
      type: object
      properties:
        schema_version:
          type: integer
        semantic_summary:
          type: string
        suggested_title:
          type: string
        tags:
          type: array
          items:
            type: string
        objects:
          type: array
          items:
            type: string
        text_highlights:
          type: array
          items:
            type: string
        safety:
          type: string
        confidence:
          type: number
        meta:
          $ref: "#/components/schemas/CloudMeta"
    PushDeliveryTarget:
      type: object
      required: [type, id]
      properties:
        type:
          type: string
          enum: [record, artifact, question, entity, place, theme, decision, chapter, reflection]
        id:
          type: string
        parent_record_id:
          type: string
          description: Parent record ID when the target is an artifact or derived memory object.
        artifact_kind:
          type: string
          description: Artifact subtype when target type is artifact.
        entity_kind:
          type: string
          description: Entity family for entity/place/theme/decision targets.
        label:
          type: string
          description: Display-safe target label.
        source_record_ids:
          type: array
          items:
            type: string
    PushDeliveryPayload:
      type: object
      required: [schema_version, intent_id, kind, target, delivery_channel]
      properties:
        schema_version:
          type: integer
          const: 1
        intent_id:
          type: string
        kind:
          type: string
        title:
          type: string
        body:
          type: string
        privacy_level:
          type: string
          enum: [generic, contextual, rich]
        deep_link:
          type: string
        delivery_channel:
          type: string
          enum: [remote]
        target:
          $ref: "#/components/schemas/PushDeliveryTarget"
        scheduled_at:
          type: string
          format: date-time
    SubscriptionStatus:
      type: object
      properties:
        user_id:
          type: string
        tier:
          type: string
        source:
          type: string
